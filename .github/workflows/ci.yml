name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  humble:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      - name: Install dependencies
        run: |
          sudo apt-get update
          rosdep update
          rosdep install --from-paths src --ignore-src --rosdistro humble -y -r

      - name: Build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install --packages-select em_robot em_robot_srv bno055

      - name: Test
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          colcon test --packages-select em_robot em_robot_srv bno055 --event-handlers console_direct+
          colcon test-result --verbose
