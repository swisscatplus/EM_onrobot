profile_name: real_robot
start_rviz: false

robot_model:
  enabled: true

movement:
  enabled: true
  backend: real
  max_speed: 1000.0
  odom_rate: 30.0
  cmd_vel_timeout: 2.0 # 0.25
  device_name: /dev/dynamixel
  baudrate: 57600
  right_motor_id: 2
  left_motor_id: 1
  wheel_radius: 0.035
  wheel_base: 0.131
  encoder_resolution: 4096
  right_wheel_odom_scale: 1.0
  left_wheel_odom_scale: 1.0
  imu_topic: /bno055/imu
  startup_motion_gate_enabled: true
  startup_motion_gate_confirmation_time: 0.2
  startup_motion_gate_linear_velocity_threshold: 0.05
  startup_motion_gate_angular_velocity_threshold: 0.2
  startup_motion_gate_accel_threshold: 0.15
  startup_motion_gate_gyro_threshold: 0.12
  startup_motion_gate_imu_timeout: 0.2

imu:
  enabled: true
  backend: bno055
  params_file: bno055_params_i2c_imuplus.yaml
  expected_rate_hz: 100.0
  static_tf_parent: base_link
  static_tf_child: bno055
  static_tf_xyzrpy: [0, 0, 0, 0, 0, 0]

localization:
  enabled: true
  camera_backend: picamera2
  source: 0
  camera_rate_hz: 10.0
  processing_scale: 0.5
  debug_image_rate_hz: 0.0
  map_odom_publish_rate_hz: 20.0
  diagnostics_rate_hz: 1.0
  debug_image_topic: /localization/debug_image
  debug_image_scale: 0.5
  
marker_map:
  enabled: true
  config: marker_map.yaml
  diagnostics_rate_hz: 1.0

ekf:
  enabled: true
  config: ekf_real.yaml

visualization:
  enabled: false
  backend: foxglove
  port: 8765
  address: 127.0.0.1

diagnostics:
  enabled: true
  publish_rate_hz: 1.0

leds:
  enabled: false
  backend: gpiozero
  active_low: false  # Set true for common-anode LEDs or inverted transistor drive.
  brightness: 1.0
  diagnostics_rate_hz: 1.0
  front_name: front
  front_topic: /leds/front/color
  front_pins: [23, 24, 25]
  front_color_order: rgb  # Change to grb/brg/etc. if calibration shows a different order.
  rear_name: rear
  rear_topic: /leds/rear/color
  rear_pins: [4, 17, 27]
  rear_color_order: rgb  # Change to grb/brg/etc. if calibration shows a different order.

state_manager:
  enabled: false # Set false temporarily while calibrating raw LED colors by hand.
  publish_rate_hz: 5.0
  blink_period_s: 1.0
  moving_linear_threshold: 0.02
  moving_angular_threshold: 0.1
