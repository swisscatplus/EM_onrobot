profile_name: real_robot
start_rviz: false

movement:
  enabled: true
  backend: real
  max_speed: 1000.0
  odom_rate: 30.0
  cmd_vel_timeout: 0.25
  device_name: /dev/dynamixel
  baudrate: 57600
  right_motor_id: 2
  left_motor_id: 1
  imu_topic: /bno055/imu
  startup_motion_gate_enabled: true
  startup_motion_gate_confirmation_time: 0.12
  startup_motion_gate_linear_velocity_threshold: 0.10
  startup_motion_gate_angular_velocity_threshold: 0.2
  startup_motion_gate_accel_threshold: 0.08
  startup_motion_gate_linear_delta_v_threshold: 0.015
  startup_motion_gate_gyro_threshold: 0.12
  startup_motion_gate_imu_timeout: 0.2
  overload_stall_gate_enabled: false
  load_stall_gate_enabled: false
  load_stall_gate_confirmation_time: 0.2
  load_stall_gate_linear_velocity_threshold: 0.05
  load_stall_gate_load_threshold: 450.0

imu:
  enabled: true
  backend: bno055
  expected_rate_hz: 100.0
  static_tf_parent: base_link
  static_tf_child: bno055
  static_tf_xyzrpy: [0, 0, 0, 0, 0, 0]

localization:
  enabled: true
  camera_backend: picamera2
  source: 0
  diagnostics_rate_hz: 1.0

marker_map:
  enabled: true
  config: marker_map.yaml
  diagnostics_rate_hz: 1.0

ekf:
  enabled: true
  config: ekf_real.yaml

visualization:
  enabled: false
  backend: foxglove
  port: 8765
  address: 127.0.0.1

diagnostics:
  enabled: true
  publish_rate_hz: 1.0
