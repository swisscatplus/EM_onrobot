profile_name: real_robot_camera_only
start_rviz: true

robot_model:
  enabled: true

movement:
  enabled: false

imu:
  enabled: false

localization:
  enabled: true
  camera_backend: picamera2
  source: 0
  camera_rate_hz: 1.0
  processing_scale: 0.5
  transform_tolerance_sec: 0.2
  max_capture_age_sec: 1.0
  max_position_jump: 0.45
  max_yaw_jump_deg: 35.0
  position_smoothing_alpha: 0.35
  yaw_smoothing_alpha: 0.35
  debug_image_rate_hz: 0.0
  map_odom_publish_rate_hz: 30.0
  publish_map_to_base: true
  diagnostics_rate_hz: 1.0
  debug_image_topic: /localization/debug_image
  debug_image_scale: 0.5

marker_map:
  enabled: true
  config: marker_map.yaml
  diagnostics_rate_hz: 1.0

ekf:
  enabled: false

visualization:
  enabled: false
  backend: foxglove
  port: 8765
  address: 127.0.0.1

diagnostics:
  enabled: true
  publish_rate_hz: 1.0
