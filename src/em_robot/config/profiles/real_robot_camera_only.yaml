profile_name: real_robot_camera_only
start_rviz: true

robot_model:
  enabled: true
  publish_joint_states: true
  joint_state_rate_hz: 10.0

movement:
  enabled: false

imu:
  enabled: false

localization:
  enabled: true
  camera_backend: picamera2
  source: 0
  process_rate_hz: 30.0
  map_odom_publish_rate_hz: 30.0
  publish_map_to_base: true
  diagnostics_rate_hz: 1.0
  debug_image_topic: /localization/debug_image
  debug_image_scale: 0.5

marker_map:
  enabled: true
  config: marker_map.yaml
  diagnostics_rate_hz: 1.0

ekf:
  enabled: false

visualization:
  enabled: false
  backend: foxglove
  port: 8765
  address: 127.0.0.1

diagnostics:
  enabled: true
  publish_rate_hz: 1.0
